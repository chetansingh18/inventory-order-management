# Netlify configuration (must live at the REPO ROOT so Netlify reads it).
# Builds the React frontend in ./frontend and publishes ./frontend/dist.
# Add an environment variable VITE_API_BASE_URL = https://your-backend.onrender.com

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
