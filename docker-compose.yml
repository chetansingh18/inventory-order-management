# Inventory & Order Management System — full stack orchestration.
#
# Usage:
#   cp .env.example .env      # adjust credentials if desired
#   docker compose up --build
#
# Services:
#   db        PostgreSQL 16 with a named volume for persistence
#   backend   FastAPI API (depends on a healthy db)
#   frontend  React build served by nginx, proxies /api -> backend

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Not published to the host by default; only the backend needs it.
    expose:
      - "5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-inventory}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://localhost:3000}
      AUTO_CREATE_TABLES: "true"
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Empty -> the bundle uses the relative /api path, proxied by nginx.
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:80"

volumes:
  pgdata:
