# Netlify configuration for the React frontend.
# In Netlify: New site → import repo → set base directory to "frontend".
# Add an environment variable VITE_API_BASE_URL = https://your-backend.onrender.com

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# SPA fallback so client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
